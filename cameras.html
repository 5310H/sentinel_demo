<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/565/565547.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentinel Camera Management</title>
    <script>
        if (!sessionStorage.getItem('sentinel_token')) {
            window.location.replace("index.html");
        }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #030406;
            --glass-bg: rgba(8, 12, 18, 0.55);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-highlight: rgba(0, 212, 255, 0.15);
            --glass-shadow: 0 25px 45px -5px rgba(0, 0, 0, 0.8);
            
            --ready: #00f0ff; 
            --not: #ff007f; 
            --armed: #ff2a55; 
            --alarm: #ff003c;
            --accent: #00e5ff;
            --text-main: #f4f7f6;
            --text-dim: #708090;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.08) 0%, transparent 45%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            padding: 40px 20px; 
            -webkit-user-select: none; 
            user-select: none; 
            animation: bg-pulse 10s infinite alternate;
        }

        @keyframes bg-pulse {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .panel-container {
            width: 100%; 
            max-width: 1400px; 
            background: var(--glass-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-radius: 32px;
            box-shadow: var(--glass-shadow);
            padding: 40px; 
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }

        .panel-title {
            font-size: 28px;
            font-weight: 300;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 0%, #a0a5b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* Stats Bar */
        .stats-bar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        .stat { text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }

        /* Grid Controls */
        .grid-controls {
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .grid-controls button {
            background: transparent;
            color: var(--text-dim);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .grid-controls button:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        .grid-controls button.active { background: rgba(0, 240, 255, 0.15); color: var(--accent); }

        /* Camera Grid */
        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .camera-grid.grid-1x1 { grid-template-columns: 1fr; }
        .camera-grid.grid-2x2 { grid-template-columns: repeat(2, 1fr); }
        .camera-grid.grid-3x3 { grid-template-columns: repeat(3, 1fr); }
        .camera-grid.grid-4x4 { grid-template-columns: repeat(4, 1fr); }

        .camera-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .camera-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .camera-card.offline { opacity: 0.6; border-color: rgba(255, 42, 85, 0.3); }
        .camera-card.disabled { opacity: 0.4; border-color: rgba(255, 255, 255, 0.1); }

        .camera-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .camera-name { font-size: 18px; font-weight: 600; color: var(--text-main); }
        
        .badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
        }
        
        .status-online { background: rgba(0, 240, 255, 0.1); color: var(--ready); border: 1px solid rgba(0, 240, 255, 0.3); }
        .status-offline { background: rgba(255, 42, 85, 0.1); color: var(--armed); border: 1px solid rgba(255, 42, 85, 0.3); }
        .status-disabled { background: rgba(255, 255, 255, 0.05); color: var(--text-dim); border: 1px solid rgba(255, 255, 255, 0.1); }

        .camera-snapshot {
            width: 100%;
            height: 220px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .camera-snapshot:hover { border-color: var(--glass-highlight); box-shadow: 0 0 15px var(--glass-highlight); }

        .camera-info {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .camera-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Buttons */
        .btn {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .btn:hover { background: rgba(0, 240, 255, 0.2); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border-color: rgba(255, 255, 255, 0.1); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-danger { background: rgba(255, 42, 85, 0.1); color: var(--armed); border-color: rgba(255, 42, 85, 0.3); }
        .btn-danger:hover { background: rgba(255, 42, 85, 0.2); }

        .header-actions { display: flex; gap: 10px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.visible { display: flex; }
        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--glass-shadow);
        }
        
        .modal-title {
            font-size: 24px;
            color: var(--text-main);
            margin-bottom: 20px;
            text-align: center;
            font-weight: 300;
        }

        .form-group { margin-bottom: 15px; }
        .form-label {
            display: block;
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        select.form-input option { background: var(--bg-color); }
        
        .form-checkbox { margin-right: 10px; }

        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .modal-actions .btn { flex: 1; padding: 14px; }

        .fullscreen-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .fullscreen-modal.visible { display: flex; }
        .fullscreen-image { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 12px; }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.2); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
        .empty-state-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.5; }

        .back-link {
            display: inline-block;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            margin-top: 30px;
            text-align: center;
            width: 100%;
            transition: color 0.3s;
            font-weight: 500;
        }

        .back-link:hover { color: var(--text-main); }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 20px; }
            .grid-controls { width: 100%; justify-content: center; }
            .header-actions { width: 100%; justify-content: center; flex-wrap: wrap; }
            .panel-container { padding: 20px; border-radius: 20px; }
        }
    </style>
</head>
<body>
    <div class="panel-container">
        <div class="header">
            <h1 class="panel-title">Camera Management</h1>

            <div class="grid-controls">
                <button onclick="setGridSize(1)" class="active">1x1</button>
                <button onclick="setGridSize(2)">2x2</button>
                <button onclick="setGridSize(3)">3x3</button>
                <button onclick="setGridSize(4)">4x4</button>
            </div>

            <div class="header-actions">
                <button class="btn" onclick="location.href='cameras_live.html'">Live View</button>
                <button class="btn" onclick="showAddCameraModal()">Add Camera</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total Cameras</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-online">0</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-snapshots">0</div>
                <div class="stat-label">Total Snapshots</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-alarm">0</div>
                <div class="stat-label">Alarm Snaps</div>
            </div>
            <div class="stat" id="stat-sd">
                <div class="stat-value" id="stat-sd-status">❓</div>
                <div class="stat-label">SD Card</div>
            </div>
        </div>

        <div class="camera-grid" id="camera-grid"></div>

        <div class="empty-state" id="empty-state" style="display:none;">
            <div class="empty-state-icon">📷</div>
            <h2>No Cameras Configured</h2>
            <p>Add your first ESP32-CAM device to get started</p>
            <button class="btn" style="margin-top: 20px;" onclick="showAddCameraModal()">Add Camera</button>
        </div>
        
        <a href="index.html" class="back-link">← Return to Control Panel</a>
    </div>

    <!-- Add/Edit Camera Modal -->
    <div class="modal" id="camera-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">Add Camera</div>
            <div class="form-group">
                <label class="form-label">Hostname or IP Address</label>
                <input type="text" class="form-input" id="input-hostname" placeholder="192.168.1.100 or camera.local" inputmode="url">
            </div>
            <div class="form-group">
                <label class="form-label">Port</label>
                <input type="number" class="form-input" id="input-port" value="80" inputmode="numeric" pattern="[0-9]*">
            </div>
            <div class="form-group">
                <label class="form-label">Friendly Name</label>
                <input type="text" class="form-input" id="input-name" placeholder="Front Door Camera">
            </div>
            <div class="form-group">
                <label class="form-label">ESPHome Camera ID</label>
                <input type="text" class="form-input" id="input-esphome-id" value="camera" placeholder="camera">
            </div>
            <div class="form-group">
                <label class="form-label">Intruder Deterrence Light</label>
                <select class="form-input" id="input-deterrence-host">
                    <option value="">None (Disabled)</option>
                </select>
                <span style="color:var(--text-dim); font-size:11px; display:block; margin-top:5px;">Select a light to turn on automatically when motion is detected.</span>
            </div>
            <div class="form-group">
                <label style="display:flex; align-items:center; color:var(--text-main); font-size:14px;">
                    <input type="checkbox" class="form-checkbox" id="input-enabled" checked>
                    Enable Camera
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="saveCamera()">Save Device</button>
                <button class="btn btn-secondary" onclick="hideCameraModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Image Viewer -->
    <div class="fullscreen-modal" id="fullscreen-modal" onclick="hideFullscreen()">
        <button class="close-btn" onclick="hideFullscreen()">×</button>
        <img class="fullscreen-image" id="fullscreen-image" src="">
    </div>

    <script>
        let cameras = [];
        let stats = {};
        let sdAvailable = false;
        let currentGridSize = 1;
        const token = sessionStorage.getItem('sentinel_token') || 'test-token-123';

        async function loadCameras() {
            try {
                const res = await fetch('/api/cameras', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                cameras = data.cameras || [];
                stats = data.stats || {};
                sdAvailable = data.sd_available || false;
                
                try {
                    const espRes = await fetch('/api/esphome', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const espData = await espRes.json();
                    if (espData.devices) {
                        const select = document.getElementById('input-deterrence-host');
                        select.innerHTML = '<option value="">None (Disabled)</option>';
                        espData.devices.forEach(dev => {
                            const opt = document.createElement('option');
                            opt.value = dev.hostname;
                            opt.textContent = `${dev.friendly_name || dev.hostname}`;
                            select.appendChild(opt);
                        });
                    }
                } catch (e) {
                    console.log('Failed to load ESPHome devices', e);
                }

                renderCameras();
                updateStats();

                if (window.snapshotInterval) clearInterval(window.snapshotInterval);
                window.snapshotInterval = setInterval(refreshAllSnapshots, 30000);
            } catch (err) {
                console.error('Failed to load cameras:', err);
            }
        }

        function renderCameras() {
            const grid = document.getElementById('camera-grid');
            const empty = document.getElementById('empty-state');

            if (cameras.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            empty.style.display = 'none';
            grid.className = `camera-grid grid-${currentGridSize}x${currentGridSize}`;
            grid.innerHTML = '';

            cameras.forEach((cam, index) => {
                const statusClass = !cam.enabled ? 'status-disabled' :
                    cam.consecutive_failures > 2 ? 'status-offline' : 'status-online';
                const statusText = !cam.enabled ? 'Disabled' :
                    cam.consecutive_failures > 2 ? 'Offline' : 'Online';

                const cardClass = !cam.enabled ? 'disabled' :
                    cam.consecutive_failures > 2 ? 'offline' : '';

                const lastSnapshot = cam.last_snapshot ?
                    new Date(cam.last_snapshot * 1000).toLocaleString() : 'Never';

                grid.innerHTML += `
                    <div class="camera-card ${cardClass}">
                        <div class="camera-header">
                            <div class="camera-name">${cam.friendly_name}</div>
                            <div class="badge ${statusClass}">${statusText}</div>
                        </div>
                        <img class="camera-snapshot" 
                             id="snapshot-${index}" 
                             src="/api/camera/${index}/snapshot?t=${Date.now()}" 
                             alt="${cam.friendly_name}"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22220%22%3E%3Crect fill=%22%23111%22 width=%22320%22 height=%22220%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Outfit,sans-serif%22 font-size=%2216%22 fill=%22%23666%22%3ENo Image%3C/text%3E%3C/svg%3E'"
                             onclick="showFullscreen(${index})">
                        <div class="camera-info">
                            <span>Host: ${cam.hostname}:${cam.port}</span>
                            <span>Updated: ${lastSnapshot}</span>
                        </div>
                        <div class="camera-actions">
                            <button class="btn btn-secondary" onclick="refreshSnapshot(${index})">Refresh</button>
                            <button class="btn btn-secondary" onclick="testCamera(${index})">Test</button>
                            <button class="btn ${cam.enabled ? 'btn-danger' : 'btn'}" onclick="toggleEnabled(${index})">
                                ${cam.enabled ? 'Disable' : 'Enable'}
                            </button>
                            <button class="btn ${cam.sd_recording_enabled ? 'btn-danger' : 'btn-secondary'}" onclick="toggleSDRecording(${index})">
                                ${cam.sd_recording_enabled ? 'SD Off' : 'SD On'}
                            </button>
                            <button class="btn btn-danger" style="grid-column: span 2;" onclick="deleteCamera(${index})">Delete Camera</button>
                        </div>
                    </div>
                `;
            });
        }

        function setGridSize(size) {
            currentGridSize = size;
            document.querySelectorAll('.grid-controls button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderCameras();
        }

        function refreshAllSnapshots() {
            cameras.forEach((_, index) => {
                setTimeout(() => {
                    const img = document.getElementById(`snapshot-${index}`);
                    if (img) img.src = `/api/camera/${index}/snapshot?t=${Date.now()}`;
                }, index * 800);
            });
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = cameras.length;
            document.getElementById('stat-online').textContent = cameras.filter(c => c.enabled && c.consecutive_failures <= 2).length;
            document.getElementById('stat-snapshots').textContent = stats.total_snapshots || 0;
            document.getElementById('stat-alarm').textContent = stats.alarm_triggered_snapshots || 0;

            const sdStatus = document.getElementById('stat-sd-status');
            const sdStat = document.getElementById('stat-sd');
            if (sdAvailable) {
                sdStatus.textContent = 'Active';
                sdStatus.style.color = 'var(--ready)';
            } else {
                sdStatus.textContent = 'N/A';
                sdStatus.style.color = 'var(--armed)';
            }
        }

        function refreshSnapshot(id) {
            const img = document.getElementById(`snapshot-${id}`);
            if (img) img.src = `/api/camera/${id}/snapshot?t=${Date.now()}`;
        }

        function showFullscreen(id) {
            const img = document.getElementById('fullscreen-image');
            img.src = `/api/camera/${id}/snapshot?t=${Date.now()}`;
            document.getElementById('fullscreen-modal').classList.add('visible');
        }

        function hideFullscreen() {
            document.getElementById('fullscreen-modal').classList.remove('visible');
        }

        async function testCamera(id) {
            try {
                const res = await fetch(`/api/camera/${id}/test`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert('Camera test successful!');
                    refreshSnapshot(id);
                } else {
                    alert('Camera test failed - check connection');
                }
            } catch (err) {
                alert('Camera test failed: ' + err.message);
            }
        }

        async function toggleEnabled(id) {
            try {
                const res = await fetch(`/api/camera/${id}/toggle`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) loadCameras();
            } catch (err) {
                alert('Failed to toggle camera: ' + err.message);
            }
        }

        async function toggleSDRecording(id) {
            if (!sdAvailable) {
                alert('SD card not available\n\nPlease insert an SD card to enable alarm recording.');
                return;
            }
            try {
                const res = await fetch(`/api/camera/${id}/sd_recording`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    loadCameras();
                } else {
                    const data = await res.json();
                    alert('Failed to toggle SD recording: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Failed to toggle SD recording: ' + err.message);
            }
        }

        async function deleteCamera(id) {
            if (!confirm(`Delete camera "${cameras[id].friendly_name}"?`)) return;
            try {
                const res = await fetch(`/api/camera/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) loadCameras();
            } catch (err) {
                alert('Failed to delete camera: ' + err.message);
            }
        }

        function showAddCameraModal() {
            document.getElementById('modal-title').textContent = 'Add Camera';
            document.getElementById('input-hostname').value = '';
            document.getElementById('input-port').value = '80';
            document.getElementById('input-name').value = '';
            document.getElementById('input-esphome-id').value = 'camera';
            document.getElementById('input-deterrence-host').value = '';
            document.getElementById('input-enabled').checked = true;
            document.getElementById('camera-modal').classList.add('visible');
        }

        function hideCameraModal() {
            document.getElementById('camera-modal').classList.remove('visible');
        }

        async function saveCamera() {
            const hostname = document.getElementById('input-hostname').value.trim();
            const port = parseInt(document.getElementById('input-port').value) || 80;
            const name = document.getElementById('input-name').value.trim();
            const esphomeId = document.getElementById('input-esphome-id').value.trim() || 'camera';
            const deterrenceHost = document.getElementById('input-deterrence-host').value;
            const enabled = document.getElementById('input-enabled').checked;

            if (!hostname || !name) {
                alert('Hostname and friendly name are required');
                return;
            }

            try {
                const res = await fetch('/api/camera/add', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        hostname, port, friendly_name: name,
                        esphome_id: esphomeId, enabled,
                        deterrence_esphome_host: deterrenceHost
                    })
                });

                if (res.ok) {
                    hideCameraModal();
                    loadCameras();
                } else {
                    const err = await res.json();
                    alert('Failed to add camera: ' + (err.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Failed to add camera: ' + err.message);
            }
        }

        setInterval(() => {
            cameras.forEach((cam, index) => {
                if (cam.enabled && cam.consecutive_failures <= 2) {
                    setTimeout(() => refreshSnapshot(index), index * 800);
                }
            });
        }, 30000);

        loadCameras();
    </script>
</body>
</html>
