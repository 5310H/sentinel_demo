<div class="modal-overlay" id="keypad-modal">
        <div class="keypad-container" style="position: relative;">
            <div class="close-modal" onclick="closeKeypad()">✕</div>
            <div id="keypad-title" style="text-align:center; color:var(--text-main); margin-bottom:15px; font-weight:600; letter-spacing:2px; font-size: 18px;">ENTER PIN</div>
            <div class="pin-display" id="pin-display"></div>
            <div style="color: #ef4444; font-size: 12px; margin-bottom: 10px; text-align: center; min-height: 15px;" id="pin-error-msg"></div>
            <div id="remember-device-container" style="display: none; align-items: center; justify-content: center; margin-bottom: 15px; color: var(--text-dim); font-size: 12px;">
                <input type="checkbox" id="remember-device-cb" style="margin-right: 8px;">
                <label for="remember-device-cb">Remember this device (30 days)</label>
            </div>
            <div class="keypad">
                <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
                <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
                <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
                <div class="key key-c" onclick="clr()">C</div><div class="key" onclick="press(0)">0</div><div class="key key-ok" onclick="submit()">OK</div>
            </div>
            <button class="modal-btn modal-btn-secondary" onclick="closeKeypad()" style="margin-top: 15px;">CANCEL</button>
        </div>
    </div>
