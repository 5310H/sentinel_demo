<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/565/565547.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentinel Relays</title>
    <script>
        if (!sessionStorage.getItem('sentinel_token')) {
            window.location.replace("index.html");
        }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #030406;
            --glass-bg: rgba(8, 12, 18, 0.55);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-highlight: rgba(0, 212, 255, 0.15);
            --glass-shadow: 0 25px 45px -5px rgba(0, 0, 0, 0.8);
            
            --ready: #00f0ff; 
            --not: #ff007f; 
            --armed: #ff2a55; 
            --alarm: #ff003c;
            --accent: #00e5ff;
            --text-main: #f4f7f6;
            --text-dim: #708090;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.08) 0%, transparent 45%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            padding: 40px 20px; 
            -webkit-user-select: none; 
            user-select: none; 
            animation: bg-pulse 10s infinite alternate;
        }

        @keyframes bg-pulse {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .panel-container {
            width: 100%; 
            max-width: 700px; 
            background: var(--glass-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-radius: 32px;
            box-shadow: var(--glass-shadow);
            padding: 40px; 
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }
        
        .header::after {
            content: ''; position: absolute; bottom: -1px; left: 25%; width: 50%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .panel-title {
            font-size: 28px;
            font-weight: 300;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 0%, #a0a5b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .panel-subtitle {
            font-size: 14px;
            color: var(--text-dim);
            margin: 8px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .settings-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        .settings-title {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin: 0 0 10px 15px;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.3s;
        }

        .settings-row:last-child {
            border-bottom: none;
        }

        .settings-label {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
        }

        .settings-label-sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        input[type="text"],
        input[type="number"],
        select {
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 16px;
            font-weight: 500;
            text-align: right;
            outline: none;
            width: 50%;
            font-family: 'Outfit', sans-serif;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 5px;
        }

        select option {
            background: var(--bg-color);
            color: var(--text-main);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--ready);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .btn-primary, .btn-secondary, .btn-danger {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-danger {
            background: rgba(255, 42, 85, 0.1);
            color: var(--armed);
            border: 1px solid rgba(255, 42, 85, 0.3);
        }

        .device-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .device-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .device-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-cell {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .info-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: var(--accent);
            font-family: 'Courier New', monospace;
        }

        .back-link {
            display: inline-block;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            margin-top: 30px;
            text-align: center;
            width: 100%;
        }

        .message {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--ready);
            color: var(--ready);
            display: block;
        }

        .message.error {
            background: rgba(255, 42, 85, 0.1);
            border: 1px solid var(--armed);
            color: var(--armed);
            display: block;
        }

        .fab-back {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(8, 12, 18, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--accent, #00e5ff);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .fab-back svg {
            width: 24px;
            height: 24px;
            stroke-width: 2.5;
        }
    </style>
</head>
<body>

<a href="index.html" class="fab-back" aria-label="Return to Dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
</a>

    <div class="panel-container">
        <div class="header">
            <h1 class="panel-title">Relays</h1>
            <p class="panel-subtitle">Manage Relays & Outputs</p>
        </div>

        <div id="message-container"></div>

        <h2 class="settings-title" id="form-title">Add Relays</h2>
        <form id="item-form" onsubmit="return saveItem(event)">
            
    <div class="settings-group">
        <input type="hidden" id="id" name="id" value="-1">
        <div class="settings-row">
            <div><div class="settings-label">Name</div><div class="settings-label-sub">Device Name</div></div>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="settings-row">
            <div><div class="settings-label">Type</div><div class="settings-label-sub">Category</div></div>
            <select id="type" name="type">
                <option value="Siren">Siren</option>
                <option value="Strobe">Strobe</option>
                <option value="Switch">Switch</option>
                <option value="Light">Light</option>
            </select>
        </div>
        <div class="settings-row">
            <div><div class="settings-label">Location</div><div class="settings-label-sub">Where is it?</div></div>
            <input type="text" id="location" name="location">
        </div>
        <div class="settings-row">
            <div><div class="settings-label">GPIO Pin</div><div class="settings-label-sub">Hardware Pin</div></div>
            <input type="number" id="gpio" name="gpio">
        </div>
        <div class="settings-row">
            <div><div class="settings-label">Duration (sec)</div><div class="settings-label-sub">0 for infinite</div></div>
            <input type="number" id="duration" name="duration" value="0">
        </div>
    </div>
    
            <button type="submit" class="btn-primary" id="submit-btn">Save</button>
            <button type="button" class="btn-secondary" onclick="cancelEdit()" id="cancel-btn" style="display: none;">Cancel</button>
        </form>

        <h2 class="settings-title" style="margin-top: 40px;">Configured Relays</h2>
        <div id="item-list">
            <div style="text-align: center; color: var(--text-dim); padding: 20px;">
                Loading...
            </div>
        </div>
    </div>

    <script>
        let editingItem = null;
        let allItems = [];

        window.addEventListener('DOMContentLoaded', () => {
            loadItems();
        });

        function showMessage(text, isError = false) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message ${isError ? 'error' : 'success'}">${text}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }

        async function loadItems() {
            try {
                const response = await fetch('/api/config/relays', {
                    headers: {'Authorization': 'Bearer ' + sessionStorage.getItem('sentinel_token')}
                });
                if (!response.ok) throw new Error('Failed to load data');
                allItems = await response.json();
                displayItems(allItems);
            } catch (error) {
                document.getElementById('item-list').innerHTML =
                    `<div style="text-align: center; color: var(--armed); padding: 20px;">Error: ${error.message}</div>`;
            }
        }

        function displayItems(items) {
            const listElement = document.getElementById('item-list');
            if (items.length === 0) {
                listElement.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px;">No entries found</div>';
                return;
            }
            listElement.innerHTML = items.map(item => {
                
    return `
    <div class="device-card">
        <div class="device-header">
            <div class="device-name">${item.name}</div>
            <div class="badge">${item.type}</div>
        </div>
        <div class="device-info-grid">
            <div class="info-cell"><div class="info-label">Location</div><div class="info-value">${item.location || 'N/A'}</div></div>
            <div class="info-cell"><div class="info-label">GPIO Pin</div><div class="info-value">${item.gpio !== undefined ? item.gpio : 'N/A'}</div></div>
        </div>
        <button class="btn-secondary" onclick="editItem(${item.id})">Edit</button>
        <button class="btn-danger" onclick="deleteItem(${item.id})">Delete</button>
    </div>`;
    
            }).join('');
        }

        function editItem(idOrAddr) {
            let item;
            if (typeof idOrAddr === 'string') {
                item = allItems.find(i => i.address === idOrAddr);
            } else {
                item = allItems.find(i => i.id === idOrAddr);
            }
            if (!item) return;

            editingItem = idOrAddr;
            document.getElementById('form-title').innerText = "Edit Relays";
            document.getElementById('submit-btn').innerText = "Update Relays";
            document.getElementById('cancel-btn').style.display = "block";

            // Populate form
            for (const key in item) {
                const el = document.getElementById(key);
                if (el) {
                    if (el.type === 'checkbox') el.checked = item[key];
                    else el.value = item[key];
                }
            }
            
            // For presence tracker updates
            if (document.getElementById('is_update')) {
                document.getElementById('is_update').value = "true";
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingItem = null;
            document.getElementById('form-title').innerText = "Add Relays";
            document.getElementById('submit-btn').innerText = "Save";
            document.getElementById('cancel-btn').style.display = "none";
            document.getElementById('item-form').reset();
            
            if (document.getElementById('id')) document.getElementById('id').value = "-1";
            if (document.getElementById('is_update')) document.getElementById('is_update').value = "false";
        }

        async function saveItem(event) {
            event.preventDefault();
            const form = document.getElementById('item-form');
            const data = {};
            new FormData(form).forEach((value, key) => data[key] = value);

            // Handle checkboxes
            form.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                data[cb.id] = cb.checked;
            });

            // Type conversions
            if (data.id) data.id = parseInt(data.id);
            if (data.gpio) data.gpio = parseInt(data.gpio);
            if (data.duration) data.duration = parseInt(data.duration);

            try {
                const response = await fetch('/api/config/relays', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + sessionStorage.getItem('sentinel_token')
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error('Failed to save');
                showMessage('Saved successfully');
                cancelEdit();
                loadItems();
            } catch (error) {
                showMessage(error.message, true);
            }
            return false;
        }

        async function deleteItem(idOrAddr) {
            if (!confirm('Are you sure you want to delete this entry?')) return;
            try {
                const response = await fetch('/api/config/relays/' + idOrAddr, {
                    method: 'DELETE',
                    headers: {'Authorization': 'Bearer ' + sessionStorage.getItem('sentinel_token')}
                });
                if (!response.ok) throw new Error('Failed to delete');
                showMessage('Deleted successfully');
                if (editingItem === idOrAddr) cancelEdit();
                loadItems();
            } catch (error) {
                showMessage(error.message, true);
            }
        }
    </script>
</body>
</html>
